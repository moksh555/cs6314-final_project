    <h1>Flight Booking History</h1>
    <div id="booking-history" >
      <!-- Flight history will be displayed here -->
      <div class="loader"></div>
      <div class="error-message"></div>
    </div>

    <script>
  function fetchBookingHistory() {
        fetch('server.php', {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({ action: "fetchBookingHistory" }), // Server action
        })  // Correct endpoint
          .then(response => response.json())
          .then(result => {
            const historyContainer = document.getElementById('booking-history');
            const errorMessage = document.querySelector('.error-message');
            const loader = document.querySelector('.loader');

            // Hide loader first
            loader.style.display = 'none';
            
            if (result.success && result.bookingHistory) {
              const table = document.createElement('table');
              let tableHeader = `<thead>
                <tr>
                  <th>Booking ID</th>
                  <th>Flight ID</th>
                  <th>Origin</th>
                  <th>Destination</th>
                  <th>Departure Date</th>
                  <th>Arrival Date</th>
                  <th>Departure Time</th>
                  <th>Arrival Time</th>
                  <th>Total Price</th>
                  <th>Passenger Details</th>
                </tr>
              </thead>`;
              
              const bookingHistory = result.bookingHistory;
              table.innerHTML = tableHeader;
              const temp = 'gLHttxWf4X'
              console.log(result)
              // Loop through each booking and render data
              Object.keys(bookingHistory).forEach(flightBookingId => {
                const booking = bookingHistory[flightBookingId];

                console.log(booking.passengerDetails)
                const row = document.createElement('tr');
                row.innerHTML = `
                  <td>${booking.flightBookingId}</td>
                  <td>${booking.flightId}</td>
                  <td>${booking.origin}</td>
                  <td>${booking.destination}</td>
                  <td>${booking.departureDate}</td>
                  <td>${booking.arrivalDate}</td>
                  <td>${booking.departureTime}</td>
                  <td>${booking.arrivalTime}</td>
                  <td>${booking.totalPrice}</td>
                  <td>
                    <ul>
                      ${booking.passengerDetails.map(passenger => `
              <li>
                SSN: ${passenger.ssn || 'N/A'}, 
                Name: ${passenger.firstName || 'N/A'} ${passenger.lastName || 'N/A'}, 
                DOB: ${passenger.dob || 'N/A'}, 
                Price: ${passenger.price || 'N/A'}
              </li>
            `).join('')}
                    </ul>
                  </td>
                `;
                table.appendChild(row);
              });

              historyContainer.appendChild(table);
            } else {
              errorMessage.style.display = 'block';
              errorMessage.innerHTML = 'No bookings found.';
            }
          })
          .catch(error => {
            console.error('Error fetching booking history:', error);
            const errorMessage = document.querySelector('.error-message');
            errorMessage.style.display = 'block';
            errorMessage.innerHTML = 'There was an error fetching your booking history.';
          });
      }
      // Call the function to load booking data when the page loads
      window.onload = fetchBookingHistory;

    </script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
